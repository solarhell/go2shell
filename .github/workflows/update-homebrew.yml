name: Update Homebrew Cask

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号 (例如: v1.0.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag
        id: validate-tag
        run: |
          set -euo pipefail
          VERSION="${{ inputs.tag }}"
          VERSION="$(printf '%s' "$VERSION" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"

          if [[ -z "$VERSION" ]]; then
            echo "Error: tag input is empty"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: invalid tag format: $VERSION"
            exit 1
          fi

          echo "Using tag: $VERSION"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download macOS checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate-tag.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}"
          curl -fsSL "${BASE_URL}/go2shell-macOS-arm64.zip.sha256" -o arm64.sha256
          curl -fsSL "${BASE_URL}/go2shell-macOS-x86_64.zip.sha256" -o x86_64.sha256

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate-tag.outputs.tag }}"
          VERSION_NUM="${VERSION#v}"

          ARM64_SHA=$(tr -d '\n\r' < arm64.sha256)
          X86_64_SHA=$(tr -d '\n\r' < x86_64.sha256)

          if [[ ! "$ARM64_SHA" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "Error: invalid arm64 checksum: $ARM64_SHA"
            exit 1
          fi

          if [[ ! "$X86_64_SHA" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "Error: invalid x86_64 checksum: $X86_64_SHA"
            exit 1
          fi

          cat > go2shell.rb << 'CASK_EOF'
          cask "go2shell" do
            version "VERSION_PLACEHOLDER"

            name "go2shell"
            desc "Open terminal from Finder"
            if Hardware::CPU.intel?
              url "https://github.com/solarhell/go2shell/releases/download/v#{version}/go2shell-macOS-x86_64.zip"
              sha256 "X86_64_SHA_PLACEHOLDER"
            else
              url "https://github.com/solarhell/go2shell/releases/download/v#{version}/go2shell-macOS-arm64.zip"
              sha256 "ARM64_SHA_PLACEHOLDER"
            end

            homepage "https://github.com/solarhell/go2shell"

            depends_on macos: ">= :sequoia"

            app "go2shell.app"

            caveats do
              <<~EOS
                go2shell is not notarized. On first launch, macOS Gatekeeper may block it.
                To allow it, run:
                  xattr -d com.apple.quarantine /Applications/go2shell.app

                Or go to System Settings > Privacy & Security > click "Open Anyway".
              EOS
            end
          end
          CASK_EOF

          sed -i "s/VERSION_PLACEHOLDER/${VERSION_NUM}/" go2shell.rb
          sed -i "s/X86_64_SHA_PLACEHOLDER/${X86_64_SHA}/" go2shell.rb
          sed -i "s/ARM64_SHA_PLACEHOLDER/${ARM64_SHA}/" go2shell.rb

          echo "Generated cask:"
          cat go2shell.rb

          git clone https://git:${GH_TOKEN}@github.com/solarhell/homebrew-tap.git
          mkdir -p homebrew-tap/Casks
          cp go2shell.rb homebrew-tap/Casks/go2shell.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/go2shell.rb
          git commit -m "Update go2shell to ${VERSION}" || echo "No changes to commit"
          git push
