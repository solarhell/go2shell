name: Update Homebrew Cask

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号 (例如: v1.0.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag
        id: validate-tag
        run: |
          set -euo pipefail
          VERSION="${{ inputs.tag }}"
          VERSION="$(printf '%s' "$VERSION" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"

          if [[ -z "$VERSION" ]]; then
            echo "Error: tag input is empty"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: invalid tag format: $VERSION"
            exit 1
          fi

          echo "Using tag: $VERSION"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate-tag.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}"
          curl -fsSL "${BASE_URL}/go2shell-macOS-arm64.zip.sha256" -o sha256.arm64
          curl -fsSL "${BASE_URL}/go2shell-macOS-x86_64.zip.sha256" -o sha256.x86_64

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate-tag.outputs.tag }}"
          VERSION_NUM="${VERSION#v}"

          SHA256_ARM64=$(tr -d '\n\r' < sha256.arm64)
          SHA256_X86_64=$(tr -d '\n\r' < sha256.x86_64)

          for sha in "$SHA256_ARM64" "$SHA256_X86_64"; do
            if [[ ! "$sha" =~ ^[0-9a-fA-F]{64}$ ]]; then
              echo "Error: invalid checksum: $sha"
              exit 1
            fi
          done

          cat > go2shell.rb << CASK_EOF
          cask "go2shell" do
            version "${VERSION_NUM}"

            on_arm do
              sha256 "${SHA256_ARM64}"
              url "https://github.com/solarhell/go2shell/releases/download/v#{version}/go2shell-macOS-arm64.zip"
            end

            on_intel do
              sha256 "${SHA256_X86_64}"
              url "https://github.com/solarhell/go2shell/releases/download/v#{version}/go2shell-macOS-x86_64.zip"
            end

            name "go2shell"
            desc "Open terminal from Finder"
            homepage "https://github.com/solarhell/go2shell"

            depends_on macos: ">= :sequoia"

            app "go2shell.app"

            caveats do
              <<~EOS
                go2shell is not notarized. On first launch, macOS Gatekeeper may block it.
                To allow it, run:
                  xattr -d com.apple.quarantine /Applications/go2shell.app

                Or go to System Settings > Privacy & Security > click "Open Anyway".
              EOS
            end
          end
          CASK_EOF

          echo "Generated cask:"
          cat go2shell.rb

          git clone https://git:${GH_TOKEN}@github.com/solarhell/homebrew-tap.git
          mkdir -p homebrew-tap/Casks
          cp go2shell.rb homebrew-tap/Casks/go2shell.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/go2shell.rb
          git commit -m "Update go2shell to ${VERSION}" || echo "No changes to commit"
          git push
