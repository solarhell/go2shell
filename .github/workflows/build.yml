name: Build

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build
        run: make build

      - name: Create zip and checksum
        run: |
          cd .build
          zip -r go2shell.zip go2shell.app
          shasum -a 256 go2shell.zip | awk '{print $1}' > go2shell.zip.sha256
          echo "SHA256:"
          cat go2shell.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-arm64
          path: |
            .build/go2shell.zip
            .build/go2shell.zip.sha256

  create-release:
    name: Create Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: release-assets/*
          append_body: true
          body: |

            ---

            ## 📦 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **macOS (ARM)** | `go2shell.zip` | Apple Silicon (M1/M2/M3/M4) |

            > ⚠️ 应用未经 notarize，首次打开可能被 Gatekeeper 拦截：
            > ```bash
            > xattr -d com.apple.quarantine /Applications/go2shell.app
            > ```
            > 或前往 系统设置 > 隐私与安全性 > 点击"仍要打开"。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
